  <!-- Preconnect to external resources -->
  <link rel="preconnect" href="https://api.anthropic.com" />

  <title>Kreata Designs | Professional Design & Graphics Services - Nairobi</title>

  <!-- Theme persistence script (run before React mounts) -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('kreata-theme');
        var theme =
          saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        /* localStorage unavailable - default styles apply */
      }
    })();
  </script>
</head>
