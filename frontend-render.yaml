services:
  - type: web
    name: kreata-frontend
    env: node
    plan: free
    nodeVersion: 18
    buildCommand: npm install && npm run build
    startCommand: npm install -g serve && serve -s build -l $PORT
    envVars:
      - key: REACT_APP_API_URL
        value: https://kreata-backend.onrender.com/api
        scope: build,runtime
    staticPublishPath: build